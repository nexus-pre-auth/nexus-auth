# ─────────────────────────────────────────────────────────────
# ROUTING MATRIX
# Maps document type → target tool(s)
# ─────────────────────────────────────────────────────────────
routing_matrix:
  prior_auth_criteria:
    targets: ["NexusAuth"]
    priority: "high"
  lcd:
    targets: ["NexusAuth"]
    priority: "high"
  ncd:
    targets: ["NexusAuth"]
    priority: "high"
  clinical_policy:
    targets: ["NexusAuth"]
    priority: "medium"
  coverage_determination:
    targets: ["NexusAuth"]
    priority: "medium"
  fee_schedule:
    targets: ["CODEMED"]
    priority: "high"
  billing_guidelines:
    targets: ["CODEMED"]
    priority: "high"
  formulary:
    targets: ["CODEMED"]
    priority: "medium"
  unknown:
    targets: ["REVIEW"]
    priority: "low"

# ─────────────────────────────────────────────────────────────
# CONFIDENCE THRESHOLDS
# ─────────────────────────────────────────────────────────────
confidence_thresholds:
  auto_accept: 0.75      # >= 0.75 → accept classification automatically
  review_required: 0.40  # 0.40–0.74 → flag for human review
  reject: 0.40           # < 0.40 → classify as 'unknown', flag for review
