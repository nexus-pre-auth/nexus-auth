version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 16 with pgvector extension
  # Mirrors AWS RDS setup exactly (same engine version, same ext)
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexusauth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusauth
      POSTGRES_USER: nexusauth
      POSTGRES_PASSWORD: nexusauth_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusauth -d nexusauth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Redis — job queuing for the scraper pipeline
  # Mirrors AWS ElastiCache (Redis 7.x)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusauth_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # pgAdmin — web UI for database inspection
  # Access at http://localhost:5050
  # Login: admin@nexusauth.dev / nexusauth_admin
  # ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexusauth_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexusauth.dev
      PGADMIN_DEFAULT_PASSWORD: nexusauth_admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
